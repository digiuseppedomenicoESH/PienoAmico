name: pienoamico
description: Trova il carburante più economico vicino a te.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Backend
  supabase_flutter: ^2.8.0

  # Mappe (OpenStreetMap, nessun costo)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Geolocalizzazione
  geolocator: ^13.0.1

  # Cache locale
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Navigazione
  go_router: ^14.6.2

  # Pubblicità
  google_mobile_ads: ^5.1.0

  # Utility
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
